<div class="container mt-5">
    <div class="card shadow-sm">
        <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">
            <h5 class="mb-0">
                <i class="bi bi-plus-lg me-2"></i>
                Nueva Sesión
            </h5>
            <button class="btn btn-outline-light btn-sm" routerLink="/sesion">
                <i class="bi bi-arrow-left"></i>
                Regresar
            </button>
        </div>
        <div class="card-body">
            <form (ngSubmit)="guardar()">
                <div class="mb-3">
                    <label class="form-label fw-semibold">
                        Miembro
                    </label>
                    <select class="form-select" name="miembroId" [(ngModel)]="sesion.miembroId">
                        <option [ngValue]="0">
                            Seleccione un miembro
                        </option>
                        @for (miembro of miembros; track miembro.miembroId) {
                        <option [ngValue]="miembro.miembroId">
                            {{ miembro.nombre }} {{ miembro.apellido }}
                        </option>
                        }
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold">
                        Entrenador
                    </label>
                    <select class="form-select" name="entrenadorId" [(ngModel)]="sesion.entrenadorId">
                        <option [ngValue]="0">
                            Seleccione un entrenador
                        </option>
                        @for (entrenador of entrenadores; track entrenador.entrenadorId) {
                        <option [ngValue]="entrenador.entrenadorId">
                            {{ entrenador.nombre }}
                        </option>
                        }
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold">
                        Fecha Sesión
                    </label>
                    <input type="date" class="form-control" name="fechaSesion" [(ngModel)]="sesion.fechaSesion">
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold">
                        Observación
                    </label>
                    <textarea rows="4" class="form-control" name="observacion" [(ngModel)]="sesion.observacion">
                </textarea>
                </div>
                <div class="d-flex justify-content-end gap-2">
                    <button type="button" class="btn btn-secondary" routerLink="/sesion">
                        Cancelar
                    </button>
                    <button type="submit" class="btn btn-primary">
                        <i class="bi bi-floppy me-1"></i>
                        Guardar
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
