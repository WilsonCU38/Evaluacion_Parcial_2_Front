<div class="container mt-5">
    <div class="card shadow-sm">
        <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">
            <h5 class="mb-0">
                <i class="bi bi-plus-lg me-2"></i>
                Nuevo Entrenador
            </h5>
            <button class="btn btn-outline-light btn-sm" routerLink="/entrenador">
                <i class="bi bi-arrow-left"></i>
                Regresar
            </button>
        </div>
        <div class="card-body">
            <form (ngSubmit)="guardar()">
                <div class="mb-3">
                    <label class="form-label fw-semibold">Nombre</label>
                    <input type="text" class="form-control" name="nombre" [(ngModel)]="entrenador.nombre">
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold">Especialidad</label>
                    <input type="text" class="form-control" name="especialidad" [(ngModel)]="entrenador.especialidad">
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold">Teléfono</label>
                    <input type="text" class="form-control" name="telefono" [(ngModel)]="entrenador.telefono">
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold">Email</label>
                    <input type="email" class="form-control" name="email" [(ngModel)]="entrenador.email">
                </div>
                <div class="d-flex justify-content-end gap-2">
                    <button type="button" class="btn btn-secondary" routerLink="/entrenador">
                        Cancelar
                    </button>
                    <button type="submit" class="btn btn-primary">
                        Guardar
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
