<div class="container mt-5">
    <div class="card shadow-sm">
        <div class="card-header bg-primary text-white">
            <h5 class="mb-0">
                <i class="bi bi-shield-lock me-2"></i>
                Autenticación de Usuario
            </h5>
        </div>
        <div class="card-body">
            <div class="row mb-3">
                <label class="col-sm-3 col-form-label">
                    Usuario
                </label>
                <div class="col-sm-9">
                    <input type="text" class="form-control" [(ngModel)]="usuario" placeholder="Ingrese el usuario">
                </div>
            </div>
            <div class="row mb-3">
                <label class="col-sm-3 col-form-label">
                    Contraseña
                </label>
                <div class="col-sm-9">
                    <input type="password" class="form-control" [(ngModel)]="clave"
                        placeholder="Ingrese la contraseña">
                </div>
            </div>
        </div>
        <div class="card-footer text-end">
            <button type="button" class="btn btn-primary" (click)="autenticacion()">
                <i class="bi bi-box-arrow-in-right me-2"></i>
                Ingresar
            </button>
        </div>
    </div>
</div>
